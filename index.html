<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひらがな れんしゅう</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fff9f0;
      --header-bg: #ff7043;
      --accent: #ff5722;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', 'Meiryo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--header-bg);
      color: white;
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }

    header h1 {
      font-size: clamp(1.3rem, 5vw, 2rem);
      letter-spacing: .05em;
      text-shadow: 2px 2px 0 rgba(0,0,0,.2);
    }

    #settings-btn {
      background: white;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 1rem;
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      transition: transform .1s, box-shadow .1s;
    }

    #settings-btn:active {
      transform: scale(.95);
      box-shadow: none;
    }

    /* ===== SETTINGS PANEL ===== */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
    }

    #settings-overlay.open {
      display: flex;
    }

    #settings-panel {
      background: white;
      width: 100%;
      max-width: 540px;
      border-radius: 24px 24px 0 0;
      padding: 24px 24px 40px;
      box-shadow: 0 -8px 30px rgba(0,0,0,.2);
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    #settings-panel h2 {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    .row-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .row-toggle {
      position: relative;
    }

    .row-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .row-toggle label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 72px;
      border-radius: 16px;
      border: 3px solid #eee;
      cursor: pointer;
      transition: all .15s;
      background: #f8f8f8;
      user-select: none;
    }

    .row-toggle label .row-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #555;
    }

    .row-toggle label .row-chars {
      font-size: .75rem;
      color: #999;
      margin-top: 2px;
    }

    .row-toggle input:checked + label {
      border-color: transparent;
      color: white;
    }

    .row-toggle input:checked + label .row-name,
    .row-toggle input:checked + label .row-chars {
      color: white;
    }

    .settings-actions {
      display: flex;
      gap: 12px;
    }

    .settings-actions button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform .1s;
    }

    .settings-actions button:active {
      transform: scale(.97);
    }

    #btn-all {
      background: #e0f2fe;
      color: #0277bd;
    }

    #btn-close {
      background: var(--header-bg);
      color: white;
    }

    /* ===== MAIN TILES ===== */
    main {
      padding: 20px 16px 40px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 縦書き五十音表: 右から左へ列を並べる */
    .chart {
      display: inline-flex;
      flex-direction: row-reverse;
      gap: 10px;
      min-width: 100%;
      padding-bottom: 8px;
    }

    .row-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .row-label {
      font-size: .78rem;
      font-weight: bold;
      letter-spacing: .05em;
      color: #888;
      writing-mode: vertical-rl;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .tile {
      width: clamp(58px, 14vw, 88px);
      height: clamp(58px, 14vw, 88px);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.7rem, 5.5vw, 2.8rem);
      font-weight: bold;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.18);
      transition: transform .1s, box-shadow .1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
      /* 縦書き */
      writing-mode: vertical-rl;
      text-orientation: upright;
    }

    .tile:active,
    .tile.playing {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,.18);
    }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,.25);
      opacity: 0;
      transition: opacity .15s;
    }

    .tile.playing::after {
      opacity: 1;
    }

    /* empty placeholder for や行/わ行 */
    .tile-empty {
      visibility: hidden;
      pointer-events: none;
    }

    /* 拗音タイル（2文字） */
    .tile-yoon {
      font-size: clamp(1.1rem, 3.8vw, 2rem);
      line-height: 1.15;
    }

    /* ===== NO ROWS SELECTED ===== */
    #empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1.1rem;
      display: none;
    }

    /* ===== SPEECH INDICATOR ===== */
    #speech-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,.75);
      color: white;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 1.8rem;
      transition: transform .2s;
      pointer-events: none;
      z-index: 50;
    }

    #speech-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 540px) {
      #settings-panel {
        border-radius: 24px;
        margin: 20px;
        margin-bottom: 0;
      }

      #settings-overlay {
        align-items: center;
      }
    }

    /* ===== APP LAYOUT ===== */
    #app-container {
      display: flex;
      align-items: stretch;
      gap: 16px;
      padding: 16px;
    }

    /* ===== WORD PANEL ===== */
    #word-panel {
      width: 240px;
      flex-shrink: 0;
      order: 2;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 22px;
      padding: 16px 14px 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,.12);
    }

    .word-panel-title {
      font-size: .78rem;
      font-weight: bold;
      letter-spacing: .06em;
      color: #aaa;
      text-align: center;
      margin-bottom: 10px;
    }

    #drop-zone {
      flex: 1;
      min-height: 120px;
      border: 3px dashed #d1d5db;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-wrap: nowrap;
      overflow-y: auto;
      gap: 10px;
      padding: 12px;
      transition: border-color .2s, background .2s;
      margin-bottom: 12px;
      position: relative;
    }

    #drop-zone.drag-over {
      border-color: #6366f1;
      background: #eef2ff;
    }

    #drop-zone.empty::after {
      content: 'ここに\Aおこう';
      white-space: pre;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
      font-size: .95rem;
      line-height: 1.6;
      text-align: center;
      pointer-events: none;
    }

    .word-tile {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      writing-mode: vertical-rl;
      text-orientation: upright;
      position: relative;
      transition: opacity .15s;
      box-shadow: 0 4px 0 rgba(0,0,0,.2);
    }

    .word-tile:hover { opacity: .75; }

    .word-tile::after {
      content: '✕';
      writing-mode: horizontal-tb;
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
    }

    .word-tile:hover::after { display: flex; }

    #speak-word-btn {
      width: 100%;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 12px 8px 10px;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 5px 0 #c2410c;
      transition: transform .1s, box-shadow .1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-bottom: 8px;
    }

    #speak-word-btn .btn-label {
      font-size: .85rem;
      font-weight: bold;
      letter-spacing: .03em;
    }

    #speak-word-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #c2410c;
    }

    #speak-word-btn:disabled {
      background: #e5e7eb;
      box-shadow: 0 5px 0 #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }


    #katakana-btn {
      background: white;
      border: none;
      border-radius: 50px;
      padding: 8px 18px;
      font-size: 1rem;
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      transition: transform .1s, box-shadow .1s, background .15s, color .15s;
    }

    #katakana-btn:active {
      transform: scale(.95);
      box-shadow: none;
    }

    #katakana-btn.active {
      background: #7c3aed;
      color: white;
    }

    #clear-word-btn {
      width: 100%;
      background: #f3f4f6;
      color: #6b7280;
      border: none;
      border-radius: 12px;
      padding: 8px;
      font-size: .85rem;
      font-weight: bold;
      cursor: pointer;
      transition: background .15s;
    }

    #clear-word-btn:hover { background: #e5e7eb; }

    /* drag ghost */
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: .85;
      transform: translate(-50%, -50%) scale(1.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      writing-mode: vertical-rl;
      text-orientation: upright;
    }

    @media (max-width: 599px) {
      #app-container {
        flex-direction: column;
        gap: 12px;
        padding: 12px 12px 40px;
      }
      #word-panel {
        width: 100%;
        position: static;
      }
      #drop-zone {
        min-height: 80px;
        flex-direction: row;
        flex-wrap: wrap;
        overflow-y: visible;
      }
    }

    @media (min-width: 600px) {
      main {
        flex: 1;
        min-width: 0;
        order: 1;
        padding: 0 0 40px;
      }
    }
  </style>
  <script src="audio-data.js"></script>
</head>
<body>

<header>

  <button id="katakana-btn">カタカナ</button>
  <button id="settings-btn">⚙️ せってい</button>
</header>

<div id="app-container">

  <!-- ことばつくりパネル -->
  <div id="word-panel">
    <div class="word-panel-title">ことばをつくろう</div>
    <div id="drop-zone" class="empty"></div>
    <button id="speak-word-btn" disabled>
      🔊<span class="btn-label">よんで！</span>
    </button>
    <button id="clear-word-btn">けす</button>
  </div>

  <main id="main">
    <div id="empty-msg">ぎょうをえらんでね！</div>
  </main>

</div>

<div id="speech-toast"></div>

<!-- Settings overlay -->
<div id="settings-overlay" role="dialog" aria-modal="true" aria-label="せってい">
  <div id="settings-panel">
    <h2>ひょうじする ぎょうを えらぼう</h2>

    <div class="row-grid" id="row-grid"></div>
    <div class="settings-actions">
      <button id="btn-all">ぜんぶ</button>
      <button id="btn-close">とじる</button>
    </div>
  </div>
</div>

<script>
  // ===== DATA =====
  const ROWS = [
    // ── 清音 ──
    { id: 'a',   label: 'あ行', chars: ['あ','い','う','え','お'] },
    { id: 'ka',  label: 'か行', chars: ['か','き','く','け','こ'] },
    { id: 'sa',  label: 'さ行', chars: ['さ','し','す','せ','そ'] },
    { id: 'ta',  label: 'た行', chars: ['た','ち','つ','て','と'] },
    { id: 'na',  label: 'な行', chars: ['な','に','ぬ','ね','の'] },
    { id: 'ha',  label: 'は行', chars: ['は','ひ','ふ','へ','ほ'] },
    { id: 'ma',  label: 'ま行', chars: ['ま','み','む','め','も'] },
    { id: 'ya',  label: 'や行', chars: ['や', null,'ゆ', null,'よ'] },
    { id: 'ra',  label: 'ら行', chars: ['ら','り','る','れ','ろ'] },
    { id: 'wa',  label: 'わ行', chars: ['わ', null, null, null,'を', 'ん'] },
    // ── 濁音 ──
    { id: 'ga',  label: 'が行', chars: ['が','ぎ','ぐ','げ','ご'] },
    { id: 'za',  label: 'ざ行', chars: ['ざ','じ','ず','ぜ','ぞ'] },
    { id: 'da',  label: 'だ行', chars: ['だ','ぢ','づ','で','ど'] },
    { id: 'ba',  label: 'ば行', chars: ['ば','び','ぶ','べ','ぼ'] },
    // ── 半濁音 ──
    { id: 'pa',  label: 'ぱ行', chars: ['ぱ','ぴ','ぷ','ぺ','ぽ'] },
    // ── 促音 ──
    { id: 'soku', label: '促音', chars: ['っ'] },
    // ── 拗音（清音） ──
    { id: 'kya', label: 'きゃ行', chars: ['きゃ','きゅ','きょ'] },
    { id: 'sha', label: 'しゃ行', chars: ['しゃ','しゅ','しょ'] },
    { id: 'cha', label: 'ちゃ行', chars: ['ちゃ','ちゅ','ちょ'] },
    { id: 'nya', label: 'にゃ行', chars: ['にゃ','にゅ','にょ'] },
    { id: 'hya', label: 'ひゃ行', chars: ['ひゃ','ひゅ','ひょ'] },
    { id: 'mya', label: 'みゃ行', chars: ['みゃ','みゅ','みょ'] },
    { id: 'rya', label: 'りゃ行', chars: ['りゃ','りゅ','りょ'] },
    // ── 拗音（濁音・半濁音） ──
    { id: 'gya', label: 'ぎゃ行', chars: ['ぎゃ','ぎゅ','ぎょ'] },
    { id: 'ja',  label: 'じゃ行', chars: ['じゃ','じゅ','じょ'] },
    { id: 'bya', label: 'びゃ行', chars: ['びゃ','びゅ','びょ'] },
    { id: 'pya', label: 'ぴゃ行', chars: ['ぴゃ','ぴゅ','ぴょ'] },
  ];

  // Pastel-vivid palette — one color per row
  const COLORS = [
    // 清音
    '#f94144','#f3722c','#f8961e','#f9c74f','#90be6d',
    '#43aa8b','#4d908e','#577590','#277da1','#9b5de5',
    // 濁音・半濁音・促音
    '#e63946','#d62839','#c1121f','#e07a5f','#81b29a',
    '#6d6875',
    // 拗音（清音）
    '#f4845f','#f7b731','#26c485','#2d9cdb','#8b5cf6','#ec4899','#06b6d4',
    // 拗音（濁音・半濁音）
    '#b91c1c','#7c3aed','#c2410c','#0369a1',
  ];

  // ===== STATE =====
  const STORAGE_KEY = 'hiragana_selected_rows';
  let selected = loadSelected();

  function loadSelected() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return new Set(JSON.parse(raw));
    } catch(e) {}
    return new Set(['a','ka','sa','ta','na','ha','ma','ya','ra','wa']); // default: 清音のみ
  }

  function saveSelected() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...selected]));
  }

// ===== AUDIO_MAP_START =====
    // ===== AUDIO_MAP_END =====

  // ===== SPEECH =====
  let currentTile = null;
  const toast = document.getElementById('speech-toast');
  let toastTimer = null;
  function currentMap() {
    return AUDIO_MAP_MALE;
  }

  function speak(char, tileEl) {
    if (currentTile) currentTile.classList.remove('playing');
    currentTile = tileEl;
    tileEl.classList.add('playing');
    showToast(char);

    const done = () => {
      tileEl.classList.remove('playing');
      currentTile = null;
    };

    const b64 = typeof AUDIO_MAP_MALE !== 'undefined' && AUDIO_MAP_MALE[char];
    if (b64) {
      const audio = new Audio('data:audio/wav;base64,' + b64);
      audio.playbackRate = 0.92;
      audio.onended = done;
      audio.onerror = () => { speakFallback(char); done(); };
      audio.play().catch(() => { speakFallback(char); done(); });
    } else {
      speakFallback(char);
      setTimeout(done, 1500);
    }
  }

  function speakFallback(char) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(char);
    u.lang = 'ja-JP';
    u.rate = 0.8;
    const v = window.speechSynthesis.getVoices().find(v => /^ja/.test(v.lang));
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }

  function showToast(char) {
    clearTimeout(toastTimer);
    toast.textContent = char;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  // ===== RENDER =====
  const main = document.getElementById('main');
  const emptyMsg = document.getElementById('empty-msg');

  function render() {
    // Clear previous chart
    const oldChart = main.querySelector('.chart');
    if (oldChart) oldChart.remove();

    const visible = ROWS.filter(r => selected.has(r.id));

    emptyMsg.style.display = visible.length === 0 ? 'block' : 'none';
    if (visible.length === 0) return;

    const chart = document.createElement('div');
    chart.className = 'chart';

    visible.forEach(row => {
      const color = COLORS[ROWS.indexOf(row)];
      const section = document.createElement('section');
      section.className = 'row-section';

      const lbl = document.createElement('div');
      lbl.className = 'row-label';
      lbl.textContent = katakanaMode ? toKatakana(row.label) : row.label;
      section.appendChild(lbl);

      row.chars.forEach(char => {
        const tile = document.createElement('div');
        if (!char) {
          tile.className = 'tile tile-empty';
          tile.setAttribute('aria-hidden', 'true');
        } else {
          tile.className = 'tile' + (char.length > 1 ? ' tile-yoon' : '');
          tile.textContent = katakanaMode ? toKatakana(char) : char;
          tile.setAttribute('role', 'button');
          tile.setAttribute('aria-label', char + 'とよむ');
          tile.style.background = color;
          tile.addEventListener('click', () => speak(char, tile));
          tile.addEventListener('pointerdown', e => startDragOnly(e, char, tile, color));
          tile.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') speak(char, tile);
          });
          tile.setAttribute('tabindex', '0');
        }
        section.appendChild(tile);
      });

      chart.appendChild(section);
    });

    main.appendChild(chart);
  }

  // ===== SETTINGS UI =====
  const overlay = document.getElementById('settings-overlay');
  const rowGrid = document.getElementById('row-grid');

  function buildSettingsGrid() {
    rowGrid.innerHTML = '';
    ROWS.forEach((row, idx) => {
      const color = COLORS[idx];
      const wrap = document.createElement('div');
      wrap.className = 'row-toggle';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'toggle_' + row.id;
      cb.checked = selected.has(row.id);

      const lbl = document.createElement('label');
      lbl.htmlFor = cb.id;
      if (cb.checked) lbl.style.background = color;

      const nameSpan = document.createElement('span');
      nameSpan.className = 'row-name';
      nameSpan.textContent = row.label;

      const charsSpan = document.createElement('span');
      charsSpan.className = 'row-chars';
      charsSpan.textContent = row.chars.filter(Boolean).join('');

      lbl.appendChild(nameSpan);
      lbl.appendChild(charsSpan);
      wrap.appendChild(cb);
      wrap.appendChild(lbl);

      cb.addEventListener('change', () => {
        if (cb.checked) {
          selected.add(row.id);
          lbl.style.background = color;
        } else {
          selected.delete(row.id);
          lbl.style.background = '';
        }
        saveSelected();
        render();
      });

      rowGrid.appendChild(wrap);
    });
  }

  document.getElementById('settings-btn').addEventListener('click', () => {
    buildSettingsGrid();
    overlay.classList.add('open');
  });

  document.getElementById('btn-close').addEventListener('click', () => {
    overlay.classList.remove('open');
  });

  document.getElementById('btn-all').addEventListener('click', () => {
    ROWS.forEach(r => selected.add(r.id));
    saveSelected();
    buildSettingsGrid();
    render();
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  // ===== WORD BUILDER =====
  let ghost = null;

  function startDragOnly(e, char, tileEl, color) {
    const startX = e.clientX;
    const startY = e.clientY;
    let dragging = false;

    function onMove(ev) {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      if (!dragging && Math.sqrt(dx * dx + dy * dy) > 8) {
        dragging = true;
        e.preventDefault();
        ghost = document.createElement('div');
        ghost.id = 'drag-ghost';
        ghost.textContent = char;
        ghost.style.cssText =
          'width:64px;height:64px;font-size:2rem;background:' + color;
        document.body.appendChild(ghost);
      }
      if (dragging) {
        ev.preventDefault();
        ghost.style.left = ev.clientX + 'px';
        ghost.style.top  = ev.clientY + 'px';
        const dz   = document.getElementById('drop-zone');
        const rect = dz.getBoundingClientRect();
        const over = ev.clientX >= rect.left && ev.clientX <= rect.right &&
                     ev.clientY >= rect.top  && ev.clientY <= rect.bottom;
        dz.classList.toggle('drag-over', over);
      }
    }

    function onUp(ev) {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup',   onUp);
      const dz = document.getElementById('drop-zone');
      dz.classList.remove('drag-over');
      if (dragging) {
        if (ghost) { ghost.remove(); ghost = null; }
        const rect = dz.getBoundingClientRect();
        if (ev.clientX >= rect.left && ev.clientX <= rect.right &&
            ev.clientY >= rect.top  && ev.clientY <= rect.bottom) {
          addToWord(char, color);
        }
        // ドラッグ後の click イベントで speak が発火しないよう抑制
        tileEl.addEventListener('click', ev => ev.stopImmediatePropagation(), { once: true });
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup',   onUp);
  }

  let katakanaMode = false;

  function toKatakana(ch) {
    return ch.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
  }

  function addToWord(char, color) {
    const dz   = document.getElementById('drop-zone');
    const tile = document.createElement('div');
    tile.className    = 'word-tile';
    tile.textContent  = katakanaMode ? toKatakana(char) : char;
    tile.dataset.char = char;
    tile.style.background = color;
    tile.title = 'タップでけす';
    tile.addEventListener('click', () => { tile.remove(); updateWordPanel(); });
    dz.appendChild(tile);
    updateWordPanel();
  }

  function updateWordPanel() {
    const dz  = document.getElementById('drop-zone');
    const btn = document.getElementById('speak-word-btn');
    const has = dz.querySelector('.word-tile');
    dz.classList.toggle('empty', !has);
    btn.disabled = !has;
  }

  function toggleKatakana() {
    katakanaMode = !katakanaMode;
    const btn = document.getElementById('katakana-btn');
    btn.classList.toggle('active', katakanaMode);
    btn.textContent = katakanaMode ? 'ひらがな' : 'カタカナ';
    // チャート全体を再描画
    render();
    // ドロップエリアのタイルも更新
    document.querySelectorAll('.word-tile').forEach(t => {
      t.textContent = katakanaMode ? toKatakana(t.dataset.char) : t.dataset.char;
    });
  }

  async function speakWord() {
    const tiles = [...document.querySelectorAll('.word-tile')];
    if (!tiles.length) return;
    const word = tiles.map(t => t.dataset.char).join('');
    const btn  = document.getElementById('speak-word-btn');
    btn.disabled = true;

    // AUDIO_MAP_WORD があればそちらを使い、なければ Web Speech API
    if (typeof AUDIO_MAP_WORD !== 'undefined') {
      for (const t of tiles) await playCharAsync(t.dataset.char);
    } else {
      await speakWithSynthesis(word);
    }
    btn.disabled = false;
  }

  function speakWithSynthesis(word) {
    return new Promise(resolve => {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(word);
      utter.lang  = 'ja-JP';
      utter.rate  = 0.9;
      utter.pitch = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const best = voices.find(v => /^ja/.test(v.lang) && !v.name.includes('compact'))
                || voices.find(v => /^ja/.test(v.lang));
      if (best) utter.voice = best;
      utter.onend  = resolve;
      utter.onerror = resolve;
      setTimeout(() => window.speechSynthesis.speak(utter), 50);
    });
  }

  function playCharAsync(char) {
    return new Promise(resolve => {
      const map = (typeof AUDIO_MAP_WORD !== 'undefined') ? AUDIO_MAP_WORD : currentMap();
      const b64 = map[char];
      if (!b64) { resolve(); return; }
      const audio = new Audio('data:audio/wav;base64,' + b64);
      audio.play();
      audio.onended = resolve;
      audio.onerror = resolve;
    });
  }

  document.getElementById('speak-word-btn').addEventListener('click', speakWord);
  document.getElementById('katakana-btn').addEventListener('click', toggleKatakana);
  document.getElementById('clear-word-btn').addEventListener('click', () => {
    document.getElementById('drop-zone').innerHTML = '';
    updateWordPanel();
  });

  // ===== INIT =====
  render();
</script>
</body>
</html>
